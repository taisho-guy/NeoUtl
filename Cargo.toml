[workspace]
members = [".", "crates/neoutl-object-api", "crates/objects/*"]
resolver = "2"

[workspace.dependencies]
neoutl-object-api = { path = "crates/neoutl-object-api" }

[package]
name = "NeoUtl"
version = "0.0.0"
edition = "2024"

[dependencies]
neoutl-object-api.workspace = true
libloading = "0.9"
slint = { version = "1.17", default-features = false, features = [
    "std",
    "backend-winit",
    "renderer-femtovg-wgpu",
    "unstable-wgpu-29",
    "compat-1-2",
] }
wgpu = "29"
wgpu_text = "29"
ffmpeg-next = "8"
tokio = { version = "1.52", features = ["rt-multi-thread", "sync"] }
bytemuck = { version = "1.25", features = ["derive"] }
shipyard = "0.11"
lucide-slint = "1.23"
image = "0.25"
image-extras = "0.1"
gpu-video = "0.4"

[build-dependencies]
lucide-slint = "1.23.0"
slint-build = "1.17"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
