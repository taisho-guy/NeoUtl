[workspace]
members = [
    ".",
    "crates/neoutl-object-api",
    "crates/objects/tetrahedron",
    "crates/objects/cube",
    "crates/objects/text",
]
resolver = "2"

[workspace.dependencies]
neoutl-object-api = { path = "crates/neoutl-object-api" }

[package]
name    = "NeoUtl"
version = "0.0.0"
edition = "2024"

[dependencies]
neoutl-object-api.workspace = true
libloading  = "0.8"
slint = { version = "1.17", default-features = false, features = [
    "std",
    "backend-winit",
    "renderer-femtovg-wgpu",
    "unstable-wgpu-29",
    "compat-1-2",
] }
wgpu        = "29"
wgpu_text   = "29"
ffmpeg-next = "8"
tokio       = { version = "1.52", features = ["rt-multi-thread", "sync"] }
bytemuck    = { version = "1.25", features = ["derive"] }
shipyard = "0.11.4"

[build-dependencies]
slint-build = "1.17"

[profile.release]
opt-level     = 3
lto           = "fat"
codegen-units = 1
panic         = "abort"
strip         = true
