name: Build

on:
  push:
    tags:
      - "*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            os_name: Linux
            artifact_name: neoutl-linux-x86_64
            binary_name: NeoUtl
            install_cmd: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config clang cmake ninja-build libxkbcommon-dev libwayland-dev libegl1-mesa-dev libudev-dev libasound2-dev libfontconfig1-dev libfreetype6-dev libexpat1-dev libavutil-dev libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev libswresample-dev libswscale-dev ffmpeg
          - os: macos-14
            os_name: macOS
            artifact_name: neoutl-macos-aarch64
            binary_name: NeoUtl
            install_cmd: brew update && brew install ffmpeg
          - os: windows-2022
            os_name: Windows
            artifact_name: neoutl-windows-x86_64
            binary_name: NeoUtl.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.install_cmd }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PKG_CONFIG: pkg-config
        run: cargo build --release --locked

      - name: Setup vcpkg (Windows / MSVC)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          runVcpkg: |
            ./vcpkg install ffmpeg:x64-windows --recurse --clean-after-build
          vcpkgTriplet: x64-windows

      - name: Build (Windows / MSVC)
        if: runner.os == 'Windows'
        shell: bash
        env:
          # ffmpeg-sys-next: pkg-configを使わず vcpkg 側の導入先を探索
          FFMPEG_SYS_NEXT_USE_PKG_CONFIG: "0"
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows
        run: |
          set -euo pipefail
          cargo clean
          cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Collect artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/${{ matrix.artifact_name }}
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/"
          cp README.md "dist/${{ matrix.artifact_name }}/"

      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/${{ matrix.artifact_name }}
          cp "target/x86_64-pc-windows-msvc/release/${{ matrix.binary_name }}" "dist/${{ matrix.artifact_name }}/"
          cp README.md "dist/${{ matrix.artifact_name }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Codeberg Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Codeberg Release
        uses: akkuman/gitea-release-action@v1
        env:
          GITEA_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          repository: taisho-guy/NeoUtl
          draft: false
          prerelease: ${{ contains(github.ref_name, 'Unstable') }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ""
          files: |
            dist/neoutl-linux-x86_64/**
            dist/neoutl-macos-aarch64/**
            dist/neoutl-windows-x86_64/**
