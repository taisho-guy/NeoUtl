name: Build

on:
  push:
    tags:
      - "*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: Linux (x86_64)
            artifact_name: neoutl-linux-x86_64
            binary_name: NeoUtl
            install_cmd: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config clang cmake ninja-build mold libxkbcommon-dev libwayland-dev libegl1-mesa-dev libudev-dev libasound2-dev libfontconfig1-dev libfreetype6-dev libexpat1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav
          - os: ubuntu-24.04-arm
            os_name: Linux (ARM64)
            artifact_name: neoutl-linux-arm64
            binary_name: NeoUtl
            install_cmd: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config clang cmake ninja-build mold libxkbcommon-dev libwayland-dev libegl1-mesa-dev libudev-dev libasound2-dev libfontconfig1-dev libfreetype6-dev libexpat1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav
          - os: macos-latest
            os_name: macOS (Apple Silicon)
            artifact_name: neoutl-macos-aarch64
            binary_name: NeoUtl
            install_cmd: brew update && brew install gstreamer
          - os: macos-26-intel
            os_name: macOS (Intel)
            artifact_name: neoutl-macos-x86_64
            binary_name: NeoUtl
            install_cmd: brew update && brew install gstreamer
          - os: windows-latest
            os_name: Windows (x86_64)
            artifact_name: neoutl-windows-x86_64
            binary_name: NeoUtl.exe
            msystem: CLANG64
            mingw_pkg_prefix: mingw-w64-clang-x86_64
            clang_dir: /clang64
            rust_target: x86_64-pc-windows-gnullvm
          - os: windows-11-arm
            os_name: Windows (ARM64)
            artifact_name: neoutl-windows-arm64
            binary_name: NeoUtl.exe
            msystem: CLANGARM64
            mingw_pkg_prefix: mingw-w64-clang-aarch64
            clang_dir: /clangarm64
            rust_target: aarch64-pc-windows-gnullvm
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install native dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.install_cmd }}

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          update: true
          cache: false
          install: ${{ format('{0}-toolchain {0}-gstreamer {0}-gst-plugins-base {0}-gst-plugins-good {0}-gst-plugins-bad {0}-gst-plugins-ugly {0}-gst-libav {0}-pkgconf {0}-ntldd zip', matrix.mingw_pkg_prefix) }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'Windows' && matrix.rust_target || '' }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PKG_CONFIG: pkg-config
        run: cargo xtask build --release

      - name: Build (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export PKG_CONFIG_PATH="${{ matrix.clang_dir }}/lib/pkgconfig"
          export PKG_CONFIG_ALLOW_CROSS=1
          cargo clean
          cargo xtask build --release --target ${{ matrix.rust_target }}

      - name: Collect artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/package
          cp target/release/${{ matrix.binary_name }} dist/package/
          [ -d target/release/objects ] && cp -r target/release/objects dist/package/
          [ -d target/release/effects ] && cp -r target/release/effects dist/package/
          cd dist/package
          zip -r ../${{ matrix.artifact_name }}.zip .

      - name: Create & Package .app Bundle (macOS Homebrew)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          mkdir -p dist
          APP_DIR="dist/NeoUtl.app"
          FRAMEWORKS_DIR="$APP_DIR/Contents/Frameworks"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$FRAMEWORKS_DIR"
          mkdir -p "$APP_DIR/Contents/Resources/gstreamer-1.0"

          cp target/release/${{ matrix.binary_name }} "$APP_DIR/Contents/MacOS/"
          [ -d target/release/objects ] && cp -r target/release/objects "$APP_DIR/Contents/Resources/"
          [ -d target/release/effects ] && cp -r target/release/effects "$APP_DIR/Contents/Resources/"

          BREW_GST_PLUGINS="$(brew --prefix gstreamer)/lib/gstreamer-1.0"
          PLUGIN_COUNT=$(find "$BREW_GST_PLUGINS" -type f \( -name "*.so" -o -name "*.dylib" \) 2>/dev/null | wc -l | tr -d ' ')
          if [ "$PLUGIN_COUNT" -eq 0 ]; then
            echo "エラー: GStreamerプラグインが0件です" >&2
            exit 1
          fi
          find "$BREW_GST_PLUGINS" -name "*.so" -exec cp {} "$APP_DIR/Contents/Resources/gstreamer-1.0/" \;
          find "$BREW_GST_PLUGINS" -name "*.dylib" -exec cp {} "$APP_DIR/Contents/Resources/gstreamer-1.0/" \;

          EXCLUDE_PLUGINS="libgstpython.dylib libgstgtk.dylib libgstgtk4.dylib libgstges.dylib libgstvalidategtk.dylib libgstvalidategapplication.dylib libgstvalidatessim.dylib libgstvalidatefaultinjection.dylib libgstvalidatetracer.dylib libgstdecklink.dylib libgstndi.dylib libgstjack.dylib libgstwhisper.dylib libgstdeepgram.dylib libgstelevenlabs.dylib libgstspeechmatics.dylib libgstdemucs.dylib libgsttensordecoders.dylib libgstspotify.dylib libgstrtmp.dylib libgstrtmp2.dylib libgstrtsp.dylib libgstrtspclientsink.dylib libgstsrt.dylib libgstsctp.dylib libgstdtls.dylib libgstsrtp.dylib libgstrist.dylib libgstwebrtc.dylib libgstwebrtchttp.dylib libgstshm.dylib libgstaws.dylib libgsticecast.dylib libgsthls.dylib libgsthlssink3.dylib libgsthlsmultivariantsink.dylib libgstdash.dylib libgstmse.dylib libgstreqwest.dylib libgstquinn.dylib libgstraptorq.dylib libgstunixfd.dylib libgstipcpipeline.dylib libgstthreadshare.dylib libgstnetsim.dylib libgstcurl.dylib libgstsoup.dylib libgstrfbsrc.dylib libgstvmnc.dylib"
          for name in $EXCLUDE_PLUGINS; do
            rm -f "$APP_DIR/Contents/Resources/gstreamer-1.0/$name"
          done

          relink() {
            local target="$1"
            chmod +w "$target"
            otool -L "$target" | tail -n +2 | awk '{print $1}' | while read -r dep; do
              case "$dep" in
                /opt/homebrew/*|/usr/local/*)
                  local base
                  base="$(basename "$dep")"
                  local dest="$FRAMEWORKS_DIR/$base"
                  if [ ! -f "$dest" ]; then
                    cp -L "$dep" "$dest"
                    chmod +w "$dest"
                    install_name_tool -id "@rpath/$base" "$dest"
                    relink "$dest"
                  fi
                  install_name_tool -change "$dep" "@rpath/$base" "$target"
                  ;;
              esac
            done
          }

          relink "$APP_DIR/Contents/MacOS/${{ matrix.binary_name }}"
          find "$APP_DIR/Contents/Resources/gstreamer-1.0" -type f -name "*.dylib" -print0 \
            | while IFS= read -r -d '' plugin; do relink "$plugin"; done

          install_name_tool -add_rpath "@executable_path/../Frameworks" "$APP_DIR/Contents/MacOS/${{ matrix.binary_name }}"

          FRAMEWORK_COUNT=$(find "$FRAMEWORKS_DIR" -type f | wc -l | tr -d ' ')
          if [ "$FRAMEWORK_COUNT" -eq 0 ]; then
            echo "エラー: Frameworksが0件です" >&2
            exit 1
          fi

          cat > "$APP_DIR/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>NeoUtl</string>
            <key>CFBundleExecutable</key>
            <string>NeoUtl</string>
            <key>CFBundleIdentifier</key>
            <string>org.codeberg.taisho-guy.NeoUtl</string>
            <key>CFBundleVersion</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          EOF

          find "$APP_DIR/Contents/Frameworks" -type f -exec codesign --force --sign - {} \;
          find "$APP_DIR/Contents/Resources/gstreamer-1.0" -type f -exec codesign --force --sign - {} \;
          [ -d "$APP_DIR/Contents/Resources/objects" ] && find "$APP_DIR/Contents/Resources/objects" -type f -exec codesign --force --sign - {} \;
          [ -d "$APP_DIR/Contents/Resources/effects" ] && find "$APP_DIR/Contents/Resources/effects" -type f -exec codesign --force --sign - {} \;
          codesign --force --sign - "$APP_DIR/Contents/MacOS/${{ matrix.binary_name }}"

          cd dist
          zip -r ${{ matrix.artifact_name }}.zip NeoUtl.app

      - name: Collect & Package GStreamer (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -uo pipefail
          mkdir -p dist/package/bin
          mkdir -p dist/package/lib/gstreamer-1.0

          cp target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }} dist/package/
          [ -d "target/${{ matrix.rust_target }}/release/objects" ] && cp -r target/${{ matrix.rust_target }}/release/objects dist/package/
          [ -d "target/${{ matrix.rust_target }}/release/effects" ] && cp -r target/${{ matrix.rust_target }}/release/effects dist/package/

          CLANG_PATH="${{ matrix.clang_dir }}"
          find "$CLANG_PATH/lib/gstreamer-1.0" -name "*.dll" -exec cp {} dist/package/lib/gstreamer-1.0/ \;
          find "$CLANG_PATH/bin" -name "libgst*.dll" -exec cp {} dist/package/bin/ \;
          find "$CLANG_PATH/bin" -name "libgstreamer*.dll" -exec cp {} dist/package/bin/ \;

          EXCLUDE_PLUGINS="libgstdecklink.dll libgstrtmp.dll libgstrtmp2.dll libgstrtsp.dll libgstsrt.dll libgstsctp.dll libgstdtls.dll libgstsrtp.dll libgstrist.dll libgstwebrtc.dll libgstwebrtcdsp.dll libgsthls.dll libgstsoup.dll libgstrfbsrc.dll libgstvmnc.dll libgstshout2.dll"
          for name in $EXCLUDE_PLUGINS; do
            rm -f "dist/package/lib/gstreamer-1.0/$name"
          done

          ( find dist/package/ \( -name "*.dll" -o -name "${{ matrix.binary_name }}" \) -print0 \
              | xargs -0 -r ntldd -R 2>/dev/null \
              | grep -iE 'clang(64|arm64)[/\\]bin' \
              | awk '{print $3}' \
              | sort -u ) > /tmp/neoutl_deps.txt || true

          if [ -s /tmp/neoutl_deps.txt ]; then
            while IFS= read -r dep; do
              [ -f "$dep" ] && cp "$dep" dist/package/bin/
            done < /tmp/neoutl_deps.txt
          fi

          cd dist/package
          zip -r ../${{ matrix.artifact_name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Codeberg Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Codeberg Release
        uses: akkuman/gitea-release-action@v1
        env:
          GITEA_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          repository: taisho-guy/NeoUtl
          draft: false
          prerelease: ${{ contains(github.ref_name, 'Unstable') }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ""
          files: |
            dist/neoutl-linux-x86_64/neoutl-linux-x86_64.zip
            dist/neoutl-linux-arm64/neoutl-linux-arm64.zip
            dist/neoutl-macos-aarch64/neoutl-macos-aarch64.zip
            dist/neoutl-macos-x86_64/neoutl-macos-x86_64.zip
            dist/neoutl-windows-x86_64/neoutl-windows-x86_64.zip
            dist/neoutl-windows-arm64/neoutl-windows-arm64.zip
