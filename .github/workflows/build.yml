name: Build

on:
  push:
    tags:
      - "*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: Linux
            artifact_name: neoutl-linux-x86_64
            binary_name: NeoUtl
            install_cmd: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config clang cmake ninja-build mold libxkbcommon-dev libwayland-dev libegl1-mesa-dev libudev-dev libasound2-dev libfontconfig1-dev libfreetype6-dev libexpat1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav
          - os: macos-latest
            os_name: macOS
            artifact_name: neoutl-macos-aarch64
            binary_name: NeoUtl
            install_cmd: brew update && brew install gstreamer dylibbundler
          - os: windows-latest
            os_name: Windows
            artifact_name: neoutl-windows-x86_64
            binary_name: NeoUtl.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install native dependencies (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.install_cmd }}

      - name: Setup MSYS2 CLANG64 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          path-type: inherit
          update: true
          cache: false
          install: >-
            mingw-w64-clang-x86_64-toolchain
            mingw-w64-clang-x86_64-gstreamer
            mingw-w64-clang-x86_64-gst-plugins-base
            mingw-w64-clang-x86_64-gst-plugins-good
            mingw-w64-clang-x86_64-gst-plugins-bad
            mingw-w64-clang-x86_64-gst-plugins-ugly
            mingw-w64-clang-x86_64-gst-libav
            mingw-w64-clang-x86_64-pkgconf
            mingw-w64-clang-x86_64-ntldd
            zip

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'Windows' && 'x86_64-pc-windows-gnullvm' || '' }}

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PKG_CONFIG: pkg-config
        run: cargo xtask build --release

      - name: Build (Windows / MSYS2 CLANG64)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export PKG_CONFIG_PATH="/clang64/lib/pkgconfig"
          export PKG_CONFIG_ALLOW_CROSS=1
          cargo clean
          cargo xtask build --release --target x86_64-pc-windows-gnullvm

      - name: Collect artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/package
          cp target/release/${{ matrix.binary_name }} dist/package/
          [ -d target/release/objects ] && cp -r target/release/objects dist/package/
          [ -d target/release/effects ] && cp -r target/release/effects dist/package/
          cd dist/package
          zip -r ../${{ matrix.artifact_name }}.zip .

      - name: Create & Package .app Bundle (macOS Homebrew)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          APP_DIR="dist/NeoUtl.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Frameworks"
          mkdir -p "$APP_DIR/Contents/Resources/gstreamer-1.0"

          cp target/release/${{ matrix.binary_name }} "$APP_DIR/Contents/MacOS/"
          [ -d target/release/objects ] && cp -r target/release/objects "$APP_DIR/Contents/Resources/"
          [ -d target/release/effects ] && cp -r target/release/effects "$APP_DIR/Contents/Resources/"

          dylibbundler -b -nc -od -x "$APP_DIR/Contents/MacOS/${{ matrix.binary_name }}" \
                       -d "$APP_DIR/Contents/Frameworks/" \
                       -p "@executable_path/../Frameworks/"
          FRAMEWORK_COUNT=$(find "$APP_DIR/Contents/Frameworks" -type f | wc -l | tr -d ' ')
          if [ "$FRAMEWORK_COUNT" -eq 0 ]; then
            echo "エラー: Frameworksが0件です" >&2
            exit 1
          fi

          BREW_GST_PLUGINS="$(brew --prefix gstreamer)/lib/gstreamer-1.0"
          PLUGIN_COUNT=$(find "$BREW_GST_PLUGINS" -type f \( -name "*.so" -o -name "*.dylib" \) 2>/dev/null | wc -l | tr -d ' ')
          if [ "$PLUGIN_COUNT" -eq 0 ]; then
            echo "エラー: GStreamerプラグインが0件です" >&2
            exit 1
          fi
          find "$BREW_GST_PLUGINS" -name "*.so" -exec cp {} "$APP_DIR/Contents/Resources/gstreamer-1.0/" \;
          find "$BREW_GST_PLUGINS" -name "*.dylib" -exec cp {} "$APP_DIR/Contents/Resources/gstreamer-1.0/" \;

          cat > "$APP_DIR/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>NeoUtl</string>
            <key>CFBundleExecutable</key>
            <string>NeoUtl</string>
            <key>CFBundleIdentifier</key>
            <string>org.codeberg.taisho-guy.NeoUtl</string>
            <key>CFBundleVersion</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
          </dict>
          </plist>
          EOF

          find "$APP_DIR/Contents/Frameworks" -type f -exec codesign --force --sign - {} \;
          find "$APP_DIR/Contents/Resources/gstreamer-1.0" -type f -exec codesign --force --sign - {} \;
          [ -d "$APP_DIR/Contents/Resources/objects" ] && find "$APP_DIR/Contents/Resources/objects" -type f -exec codesign --force --sign - {} \;
          [ -d "$APP_DIR/Contents/Resources/effects" ] && find "$APP_DIR/Contents/Resources/effects" -type f -exec codesign --force --sign - {} \;
          codesign --force --sign - "$APP_DIR/Contents/MacOS/${{ matrix.binary_name }}"

          cd dist
          zip -r ${{ matrix.artifact_name }}.zip NeoUtl.app

      - name: Collect & Package GStreamer (Windows CLANG64)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -uo pipefail
          mkdir -p dist/package/bin
          mkdir -p dist/package/lib/gstreamer-1.0

          cp target/x86_64-pc-windows-gnullvm/release/${{ matrix.binary_name }} dist/package/
          [ -d "target/x86_64-pc-windows-gnullvm/release/objects" ] && cp -r target/x86_64-pc-windows-gnullvm/release/objects dist/package/
          [ -d "target/x86_64-pc-windows-gnullvm/release/effects" ] && cp -r target/x86_64-pc-windows-gnullvm/release/effects dist/package/

          CLANG_PATH="/clang64"
          find "$CLANG_PATH/lib/gstreamer-1.0" -name "*.dll" -exec cp {} dist/package/lib/gstreamer-1.0/ \;
          find "$CLANG_PATH/bin" -name "libgst*.dll" -exec cp {} dist/package/bin/ \;
          find "$CLANG_PATH/bin" -name "libgstreamer*.dll" -exec cp {} dist/package/bin/ \;

          ( find dist/package/ \( -name "*.dll" -o -name "${{ matrix.binary_name }}" \) -print0 \
              | xargs -0 -r ntldd -R 2>/dev/null \
              | grep -iE 'clang64[/\\]bin' \
              | awk '{print $3}' \
              | sort -u ) > /tmp/neoutl_deps.txt || true

          if [ -s /tmp/neoutl_deps.txt ]; then
            while IFS= read -r dep; do
              [ -f "$dep" ] && cp "$dep" dist/package/bin/
            done < /tmp/neoutl_deps.txt
          fi

          cd dist/package
          zip -r ../${{ matrix.artifact_name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Codeberg Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Codeberg Release
        uses: akkuman/gitea-release-action@v1
        env:
          GITEA_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          repository: taisho-guy/NeoUtl
          draft: false
          prerelease: ${{ contains(github.ref_name, 'Unstable') }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ""
          files: |
            dist/neoutl-linux-x86_64/neoutl-linux-x86_64.zip
            dist/neoutl-macos-aarch64/neoutl-macos-aarch64.zip
            dist/neoutl-windows-x86_64/neoutl-windows-x86_64.zip
