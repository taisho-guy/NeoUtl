name: Build

on:
  push:
    tags:
      - "*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            os_name: Linux
            artifact_name: neoutl-linux-x86_64
            binary_name: NeoUtl
            install_cmd: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config clang cmake ninja-build libxkbcommon-dev libwayland-dev libegl1-mesa-dev libudev-dev libasound2-dev libfontconfig1-dev libfreetype6-dev libexpat1-dev libavutil-dev libavcodec-dev libavformat-dev libavfilter-dev libavdevice-dev libswresample-dev libswscale-dev ffmpeg
          - os: macos-14
            os_name: macOS
            artifact_name: neoutl-macos-aarch64
            binary_name: NeoUtl
            install_cmd: brew untap aws/tap || true && brew update && brew install ffmpeg
          - os: windows-2022
            os_name: Windows
            artifact_name: neoutl-windows-x86_64
            binary_name: NeoUtl.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install native dependencies
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.install_cmd }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PKG_CONFIG: pkg-config
        run: cargo build --release --locked

      - name: Install ffmpeg via Chocolatey (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg -y
          mkdir -p dist/ffmpeg
          copy C:\\ProgramData\\chocolatey\\bin\\ffmpeg.exe dist\\ffmpeg\\
          copy C:\\ProgramData\\chocolatey\\lib\\ffmpeg\\tools\\ffmpeg\\bin\\*.dll dist\\ffmpeg\\

      - name: Build (Windows / MSVC)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cargo clean
          cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Collect artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          zip -r dist/${{ matrix.artifact_name }}.zip \
            target/release/${{ matrix.binary_name }} \
            target/release/objects

      - name: Create .app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          mkdir -p NeoUtl.app/Contents/MacOS
          mkdir -p NeoUtl.app/Contents/Resources
          cp target/release/${{ matrix.binary_name }} NeoUtl.app/Contents/MacOS/
          cat > NeoUtl.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>NeoUtl</string>
            <key>CFBundleExecutable</key>
            <string>NeoUtl</string>
            <key>CFBundleIdentifier</key>
            <string>org.codeberg.taisho-guy.NeoUtl</string>
            <key>CFBundleVersion</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF
          zip -r dist/${{ matrix.artifact_name }}.zip NeoUtl.app

      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p dist
          powershell Compress-Archive -Path `
            "target/x86_64-pc-windows-msvc/release/${{ matrix.binary_name }}", `
            "target/x86_64-pc-windows-msvc/release/objects", `
            "dist/ffmpeg/*" `
            -DestinationPath "dist/${{ matrix.artifact_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Codeberg Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Codeberg Release
        uses: akkuman/gitea-release-action@v1
        env:
          GITEA_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          repository: taisho-guy/NeoUtl
          draft: false
          prerelease: ${{ contains(github.ref_name, 'Unstable') }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ""
          files: |
            dist/neoutl-linux-x86_64.zip
            dist/neoutl-macos-aarch64.zip
            dist/neoutl-windows-x86_64.zip
