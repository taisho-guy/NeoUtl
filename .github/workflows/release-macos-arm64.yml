name: Build and Release macOS (ARM64)

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS (ARM64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python Dependencies
        run: |
          pip3 install PySide6 --break-system-packages

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 500M
          key: macos-ccache

      - name: Build and Package
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION=$(echo "$TAG_NAME" | sed -E 's/^v?([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')
          CODENAME=$(echo "$TAG_NAME" | sed -E 's/^v?[0-9]+\.[0-9]+\.[0-9]+-?(.*)$/\1/')
          if [ -z "$CODENAME" ]; then
            CODENAME="Unstable"
          fi
          echo "RELEASE_NAME=$VERSION $CODENAME" >> "$GITHUB_ENV"
          echo "Building version: $VERSION, codename: $CODENAME"
          python3 BUILD.py --xcode --version "$VERSION" --codename "$CODENAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AviQtl-macOS-Xcode-Universal
          path: dist/AviQtl-macOS-Xcode-Universal.zip
          retention-days: 1
          if-no-files-found: error

      - name: Create Codeberg Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: akkuman/gitea-release-action@v1
        env:
          GITEA_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          repository: taisho-guy/AviQtl
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          body: ""
          files: |
            dist/AviQtl-macOS-Xcode-Universal.zip

      - name: Delete GitHub Actions Artifact
        if: success()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: AviQtl-macOS-Xcode-Universal