name: Build and Release Windows (x86_64)

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PySide6
        run: pip install PySide6

      - name: Setup Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.0'
          arch: 'win64_msvc2019_64'
          # プロジェクトに必要な追加モジュール
          modules: 'qtmultimedia qtshadertools qt5compat qtsvg'

      - name: Cache vcpkg dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.build_tmp/msvc/Release/vcpkg_installed
          key: vcpkg-msvc-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-msvc-${{ runner.os }}-

      - name: Build and Package
        # BUILD.py は自動的に msvc ターゲットを選択し、env.QT_ROOT を参照します。
        # VCPKG_ROOT を設定してシステム既定の vcpkg を使用可能にします。
        run: python BUILD.py --msvc --qt-dir "${{ env.QT_ROOT_DIR }}"
        env:
          VCPKG_ROOT: ${{ env.VCPKG_INSTALLATION_ROOT }}
          GIT_TERMINAL_PROMPT: 0

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with: # アーティファクト名をMSVC用に更新
          name: AviQtl-MSVC-x86_64
          path: dist/AviQtl-MSVC-x86_64.zip
          retention-days: 1
          if-no-files-found: error

      - name: Create Codeberg Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: akkuman/gitea-release-action@v1
        env:
          GITEA_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        with:
          server_url: https://codeberg.org
          token: ${{ secrets.CODEBERG_TOKEN }}
          repository: taisho-guy/AviQtl
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ""
          files: | # アーティファクトパスをMSVC用に更新
            dist/AviQtl-MSVC-x86_64.zip

      - name: Delete GitHub Actions Artifact
        if: success()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: AviQtl-MSVC-x86_64 # アーティファクト名をMSVC用に更新